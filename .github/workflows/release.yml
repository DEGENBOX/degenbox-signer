name: Release Signers

# Builds and publishes pre-compiled signer binaries for end users so
# they no longer need to `cargo install` from source.
#
# Triggered by pushing a tag like `v0.1.0-signer` (mint the next one with
# `scripts/next-signer-version.sh`). The matrix builds four target
# platforms in parallel for both signer binaries (`hl-signer-desktop`,
# the unified HL + Solana CLI, plus the DEPRECATED Solana-only
# `degenbox-signer-cli`), packages them, computes sha256, then a final
# job creates a GitHub Release with all artifacts + a SHASUMS256.txt
# body. The Tauri desktop app releases separately under `v*-app` tags
# via release-signer-app.yml.
#
# OpenSSL: since the CLI unification, hl-signer-desktop links
# openssl-sys on EVERY platform (signer-core → solana-sdk →
# solana-secp256r1-program). macOS runners resolve it via the
# preinstalled Homebrew openssl@3, Linux via libssl-dev (installed
# explicitly below), Windows via the vendored-openssl build in the
# crate's `[target.'cfg(windows)'.dependencies]` (needs Perl — the
# windows-2022 image ships Strawberry Perl + NASM).
#
# Cargo.lock: both crates build with --locked. Every dep or version
# bump MUST commit the regenerated trading/<crate>/Cargo.lock in the
# same commit as the tag target — stale locks are the #1 historical
# cause of red releases, so a preflight step fails fast with a clear
# message.
#
# Code-signing is wired but SECRET-GATED so the build never breaks when
# the certs aren't configured yet:
#   * macOS  — Developer-ID codesign (hardened runtime + timestamp) +
#     notarytool submit. Runs only when APPLE_CERT_P12 + APPLE_NOTARY_KEY
#     secrets are present (see `HAS_APPLE` below). Without them the binary
#     ships unsigned and macOS shows the "cannot verify developer" prompt.
#   * Windows — Authenticode signtool. Runs only when WINDOWS_CERT_PFX is
#     present (`HAS_WINDOWS`). The hl-signer-desktop .exe ships the full
#     unified HL + Solana stack (openssl vendored on this target); only
#     the DEPRECATED Solana-only signer-cli is skipped on Windows.
# Required secrets to enable signing:
#   APPLE_CERT_P12 (base64 .p12), APPLE_CERT_PASSWORD,
#   APPLE_SIGNING_IDENTITY ("Developer ID Application: …"),
#   APPLE_NOTARY_KEY (base64 .p8), APPLE_NOTARY_KEY_ID, APPLE_NOTARY_ISSUER_ID,
#   WINDOWS_CERT_PFX (base64 .pfx), WINDOWS_CERT_PASSWORD.
#
# TODO: Windows MSI installer (currently we ship a plain .zip with the
# .exe). Users have to unzip + add to PATH manually.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to build + publish (e.g. v0.1.0-signer)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    # Derive "are signing certs configured?" once. Secrets can't be read
    # in step `if:` directly, so we project them to booleans here and gate
    # the signing steps on these — keeping the build green when unset.
    env:
      HAS_APPLE: ${{ secrets.APPLE_CERT_P12 != '' && secrets.APPLE_NOTARY_KEY != '' }}
      HAS_WINDOWS: ${{ secrets.WINDOWS_CERT_PFX != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            os: macos
            ext: tar.gz
            build_solana: true
          - target: x86_64-apple-darwin
            # macOS Intel runner — macos-13 was retired; macos-15-intel is the
            # current x86_64 image. (macos-14 and newer arm-only labels are arm64.)
            runner: macos-15-intel
            os: macos
            ext: tar.gz
            build_solana: true
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            os: linux
            ext: tar.gz
            build_solana: true
          # Windows: hl-signer-desktop only. `build_solana: false` now means
          # "skip the DEPRECATED standalone signer-cli" — Windows users get
          # the full Solana stack inside hl-signer-desktop.exe itself, which
          # builds openssl-sys from source via its windows-only
          # `openssl = { vendored }` dep (Strawberry Perl + NASM are on the
          # windows-2022 image). signer-cli stays unix-only until it dies
          # with the browser extension; not worth porting.
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            os: windows
            ext: zip
            build_solana: false

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag / version
        id: ver
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG:-}" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi
          # Validate: only allow tags like vMAJOR.MINOR.PATCH(-prerelease)-signer
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?-signer$'; then
            echo "ERROR: tag '$tag' does not match v<MAJOR>.<MINOR>.<PATCH>[-prerelease]-signer" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          ver="${tag#v}"
          ver="${ver%-signer}"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      # Fail fast (seconds, on every leg) when a Cargo.lock wasn't committed
      # with the version/dep bump — historically the most common red-release
      # cause; the --locked builds below would otherwise burn minutes first.
      - name: Preflight Cargo.lock in sync
        shell: bash
        run: |
          set -euo pipefail
          for crate in trading/hl-signer-desktop trading/signer-desktop; do
            (cd "$crate" && cargo metadata --locked --format-version 1 >/dev/null) \
              || { echo "::error::$crate/Cargo.lock is stale — regenerate it (cargo update -w in $crate) and commit it together with the bump"; exit 1; }
          done

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # hl-signer-desktop links openssl-sys on Linux since the Solana
      # unification (no vendored build here — distro libssl is fine for a
      # gnu-target binary). The runner image usually ships libssl-dev, but
      # install explicitly so an image update can't silently break releases.
      - name: Install OpenSSL headers (linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      # Each signer crate is its own workspace (independent Cargo.lock).
      # Cache per crate + target so re-tagging is fast.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: ${{ matrix.target }}

      - name: Build hl-signer-desktop
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --locked -p hl-signer-desktop --target "$TARGET"

      # Guard: the binary MUST report the same version as the release tag.
      # Every matrix runner is native to its target, so we can just run it.
      # A mismatch (e.g. a stale build cache baking an old CARGO_PKG_VERSION)
      # fails the whole release instead of shipping a wrong-version binary
      # that still passes sha256 verification downstream.
      - name: Assert hl-signer-desktop version == tag (unix)
        if: matrix.os != 'windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          EXPECTED: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          actual="$("target/$TARGET/release/hl-signer-desktop" --version | awk '{print $NF}')"
          echo "binary=$actual tag=$EXPECTED"
          [ "$actual" = "$EXPECTED" ] || { echo "::error::hl-signer-desktop version $actual != tag $EXPECTED — refusing to release"; exit 1; }

      - name: Assert hl-signer-desktop version == tag (windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          EXPECTED: ${{ steps.ver.outputs.version }}
        run: |
          $out = & "target/$env:TARGET/release/hl-signer-desktop.exe" --version
          $actual = ($out -split '\s+')[-1]
          Write-Host "binary=$actual tag=$env:EXPECTED"
          if ($actual -ne $env:EXPECTED) { Write-Error "hl-signer-desktop version $actual != tag $env:EXPECTED — refusing to release"; exit 1 }


      - name: Strip debug symbols (unix)
        if: matrix.os != 'windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          strip "target/$TARGET/release/hl-signer-desktop" || true

      - name: Codesign + notarize (macOS)
        if: matrix.os == 'macos' && env.HAS_APPLE == 'true'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          # 1. Import the Developer-ID cert into a throwaway keychain.
          keychain="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p actions "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p actions "$keychain"
          printf '%s' "$APPLE_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$keychain" \
            -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$keychain" >/dev/null
          # 2. Sign each binary with the hardened runtime + secure timestamp.
          printf '%s' "$APPLE_NOTARY_KEY" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          for bin in \
            "target/${TARGET}/release/hl-signer-desktop" \
            "trading/signer-desktop/target/${TARGET}/release/signer-cli"; do
            [ -f "$bin" ] || continue
            codesign --force --options runtime --timestamp \
              --sign "$APPLE_SIGNING_IDENTITY" "$bin"
            codesign --verify --strict --verbose=2 "$bin"
            # 3. Notarize the signed binary (zip container). Bare CLI tools
            #    can't be stapled, so Gatekeeper verifies the ticket online;
            #    --wait fails the job if Apple rejects the binary.
            ditto -c -k "$bin" "$RUNNER_TEMP/notarize.zip"
            xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
              --key "$RUNNER_TEMP/notary.p8" \
              --key-id "$APPLE_NOTARY_KEY_ID" \
              --issuer "$APPLE_NOTARY_ISSUER_ID" \
              --wait
          done

      - name: Sign (windows)
        if: matrix.os == 'windows' && env.HAS_WINDOWS == 'true'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          $pfx = Join-Path $Env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($Env:WINDOWS_CERT_PFX))
          $bin = "target/$($Env:TARGET)/release/hl-signer-desktop.exe"
          # signtool ships with the Windows SDK on the windows-2022 image.
          & signtool sign /f $pfx /p $Env:WINDOWS_CERT_PASSWORD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $bin
          & signtool verify /pa $bin

      - name: Package (unix)
        if: matrix.os != 'windows'
        shell: bash
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p dist staging

          # hl-signer-desktop
          name="hl-signer-desktop-${TAG}-${TARGET}"
          mkdir -p "staging/${name}"
          cp "target/${TARGET}/release/hl-signer-desktop" "staging/${name}/"
          [ -f trading/hl-signer-desktop/INSTALL.md ] && cp trading/hl-signer-desktop/INSTALL.md "staging/${name}/" || true
          tar -C staging -czf "dist/${name}.tar.gz" "${name}"


      - name: Package (windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $Env:TAG
          $target = $Env:TARGET
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path staging | Out-Null

          # hl-signer-desktop only (signer-cli/Solana skipped on Windows — openssl-sys)
          $name = "hl-signer-desktop-$tag-$target"
          $stage = "staging/$name"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/$target/release/hl-signer-desktop.exe" $stage
          if (Test-Path "trading/hl-signer-desktop/INSTALL.md") { Copy-Item "trading/hl-signer-desktop/INSTALL.md" $stage }
          # Zip the CONTENTS (not the folder itself) so "Extract All" produces
          # a single flat folder — no double-nesting on Windows.
          Push-Location $stage
          Compress-Archive -Path * -DestinationPath "../../dist/$name.zip" -Force
          Pop-Location

      - name: Checksum (unix)
        if: matrix.os != 'windows'
        shell: bash
        working-directory: dist
        run: |
          set -euo pipefail
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum -- *.tar.gz > SHASUMS256.txt
          else
            shasum -a 256 -- *.tar.gz > SHASUMS256.txt
          fi
          cat SHASUMS256.txt

      - name: Checksum (windows)
        if: matrix.os == 'windows'
        shell: pwsh
        working-directory: dist
        run: |
          Get-ChildItem -Filter *.zip | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$h  $($_.Name)"
          } | Out-File -Encoding ascii SHASUMS256.txt
          Get-Content SHASUMS256.txt

      - uses: actions/upload-artifact@v4
        with:
          name: signers-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: ver
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG:-}" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?-signer$'; then
            echo "ERROR: tag '$tag' does not match v<MAJOR>.<MINOR>.<PATCH>[-prerelease]-signer" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: signers-*
          merge-multiple: false

      - name: Flatten + aggregate checksums
        run: |
          set -euo pipefail
          mkdir -p release
          : > SHASUMS256.txt
          # Move every archive to release/ and combine the per-target
          # SHASUMS256.txt files into a single SHASUMS256.txt.
          for dir in artifacts/signers-*; do
            for f in "$dir"/*; do
              name="$(basename "$f")"
              case "$name" in
                SHASUMS256.txt) cat "$f" >> SHASUMS256.txt ;;
                *) mv "$f" release/ ;;
              esac
            done
          done
          sort -u SHASUMS256.txt -o SHASUMS256.txt
          cp SHASUMS256.txt release/SHASUMS256.txt
          ls -la release

      - name: Compose release body
        id: body
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          {
            printf 'DegenBox signer binaries %s.\n\n' "$TAG"
            printf '## Install\n\n'
            printf '```sh\n'
            printf 'curl -fsSL https://degenbox.app/install-signer.sh | sh\n'
            printf '```\n\n'
            printf 'Or download the archive for your platform below, extract, and add the binary to your PATH.\n\n'
            printf '## Checksums (sha256)\n\n'
            printf '```\n'
            cat SHASUMS256.txt
            printf '```\n'
          } > BODY.md
          echo "path=BODY.md" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: ${{ steps.body.outputs.path }}
          files: |
            release/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
